<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="output">
    <h1>Accesso</h1>

    <form id="login-form" onsubmit="handleLogin(event)">
      <label for="login-email">Email:</label>
      <input type="email" id="login-email" required>

      <label for="login-password">Password:</label>
      <input type="password" id="login-password" required>

      <button id="processBtn" type="submit">Accedi</button>
    </form>
    <p id="message"></p>
  </div>

<script>
async function handleLogin(event) {
    event.preventDefault(); // evita il refresh della pagina

    const email = document.getElementById("login-email").value.trim().toLowerCase();
    const password = document.getElementById("login-password").value;

    try {
        const risposta = await fetch('utenti.json');
        const dati = await risposta.json();
        const utenti = dati.utenti;

        let trovato = false;

        for (let i = 0; i < utenti.length; i++) {
            if (utenti[i].email.toLowerCase() === email && utenti[i].password === password) {
                trovato = true;
                break;
            }
        }

        const message = document.getElementById("message");

        if (trovato) {
            message.style.color = "green";
            message.textContent = "Accesso effettuato! Reindirizzamento...";
            // redirect dopo 1 secondo
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        } else {
            message.style.color = "red";
            message.textContent = "Email o password non corretti. Contatta l'amministratore.";
        }

    } catch (error) {
        console.error("Errore nel caricamento del file JSON:", error);
    }
}
</script>
</body>
</html>
