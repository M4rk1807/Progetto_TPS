<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=initial-scale=1.0">
  <title>Accesso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="output">
    <h1>Accesso</h1>

    <form id="login-form" onsubmit="handleLogin(event)">
      <label for="login-email">Email:</label>
      <input type="email" id="login-email" required>

      <label for="login-password">Password:</label>
      <input type="password" id="login-password" required>

      <button id="processBtn", type="submit">Accedi</button>
    </form>
  </div>

  <script>

    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById("login-email").value.trim().toLowerCase();
      const password = document.getElementById("login-password").value;


        processBtn=document.getElementById("processBtn");
        processBtn.addEventListener("click", async () => {
            const risposta= await fetch ('utenti.json');
            const dati=await risposta.json();
            const utenti = dati.utenti;
            let valore = document.getElementById("text").value;


            let htmlOutput = ""; 

            for (let i = 0; i < utenti.length; i++) {
                if(utenti[i].email.toLowerCase() === email && utenti[i].password === password){
                    htmlOutput ="Accesso effettuato!";
                    window.location.href = "index.html";
                break;}
                else{
                    htmlOutput ="Email non registrata. Contatta l'amministratore.";
                }
            }
            document.getElementById("output").innerHTML = htmlOutput

        });
    }

    function showForm(type) {
      document.getElementById("form-title").textContent = type === "register" ? "Registrazione" : "Accesso";
      document.getElementById("register-form").classList.toggle("hidden", type !== "register");
      document.getElementById("login-form").classList.toggle("hidden", type !== "login");
    }
    

  </script>
</body>
</html>
